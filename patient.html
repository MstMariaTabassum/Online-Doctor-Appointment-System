<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard | Doctor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .navbar {
    background: linear-gradient(135deg, #7c3aed, #8b5cf6) !important;
    color: white !important;
}
        /* Patient Dashboard Styles */
        .patient-dashboard {
            min-height: 100vh;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            padding: 00px 0 50px;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }
        
        .welcome-section h1 {
            color: white;
            -webkit-text-fill-color: white;
            margin-bottom: 0.5rem;
        }
        
        .patient-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card-patient {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .stat-card-patient:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .stat-icon-patient {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #3b82f6;
        }
        
        .stat-number-patient {
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        
        .stat-label-patient {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        /* Appointment Status Cards */
        .appointment-status-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 5px solid;
            transition: all 0.3s ease;
        }
        
        .appointment-status-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .appointment-status-card.pending {
            border-left-color: #f59e0b;
        }
        
        .appointment-status-card.confirmed {
            border-left-color: #10b981;
        }
        
        .appointment-status-card.completed {
            border-left-color: #3b82f6;
        }
        
        .appointment-status-card.cancelled {
            border-left-color: #ef4444;
        }
        
        .appointment-header-patient {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f3f4f6;
        }
        
        .doctor-info-patient {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .doctor-avatar-patient {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .appointment-details-patient {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .detail-item-patient {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #6b7280;
        }
        
        .detail-item-patient i {
            color: #3b82f6;
            width: 20px;
        }
        
        .status-display {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .status-pending-display {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-confirmed-display {
            background: #d1fae5;
            color: #059669;
        }
        
        .status-completed-display {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .status-cancelled-display {
            background: #fee2e2;
            color: #dc2626;
        }
        
        /* Book Appointment Button */
        .book-appointment-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 2rem auto;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        
        .book-appointment-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        /* Empty State */
        .empty-appointments-patient {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin: 2rem 0;
        }
        
        .empty-appointments-patient i {
            font-size: 4rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .patient-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .appointment-header-patient {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .appointment-details-patient {
                grid-template-columns: 1fr;
            }
            
            .doctor-info-patient {
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .patient-stats {
                grid-template-columns: 1fr;
            }
            
            .welcome-section {
                text-align: center;
            }
        }
    </style>
</head>
<body class="patient-dashboard">
    <!-- Patient Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">
                <i class="fas fa-user-injured"></i>
                <span>Patient Portal</span>
            </a>
            <ul class="nav-links">
                <li><a href="#" onclick="loadDashboard()" class="active">
                    <i class="fas fa-home"></i> Dashboard
                </a></li>
                <li><a href="#" onclick="loadBookAppointment()">
                    <i class="fas fa-calendar-plus"></i> Book Appointment
                </a></li>
                <li><a href="#" onclick="loadMyAppointments()">
                    <i class="fas fa-calendar-alt"></i> My Appointments
                </a></li>
                <li><a href="#" onclick="loadMedicalHistory()">
                    <i class="fas fa-file-medical"></i> Medical History
                </a></li>
                <li>
                    <div class="admin-profile">
                        <div class="doctor-avatar-small" style="background: linear-gradient(135deg);">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="profile-info">
                            <span class="profile-name" id="patientName">Patient Name</span>
                            <span class="profile-role">Patient</span>
                        </div>
                        <button class="btn-logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </li>
            </ul>
           
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div id="patientContent">
            <!-- Content will be loaded by JavaScript -->
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Book Appointment Modal -->
    <div id="bookAppointmentModal" class="admin-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-plus"></i> Book New Appointment</h3>
                <button class="modal-close" onclick="closeBookModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="bookModalContent">
                    <!-- Booking form will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/patient.js"></script>
</body>
</html>
