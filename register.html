<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Doctor Appointment System</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="role">Register as</label>
                    <select id="role" name="role" required onchange="toggleDoctorFields()">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                    </select>
                </div>
                
                <!-- Doctor specific fields -->
                <div id="doctorFields" style="display: none;">
                    <div class="form-group">
                        <label for="specialization">Specialization</label>
                        <input type="text" id="specialization" name="specialization">
                    </div>
                    <div class="form-group">
                        <label for="experience">Experience (years)</label>
                        <input type="number" id="experience" name="experience">
                    </div>
                    <div class="form-group">
                        <label for="consultation_fee">Consultation Fee ($)</label>
                        <input type="number" id="consultation_fee" name="consultation_fee">
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">Register</button>
                <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
                <p class="auth-link"><a href="index.html">Back to Home</a></p>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script>
        function toggleDoctorFields() {
            const role = document.getElementById('role').value;
            const doctorFields = document.getElementById('doctorFields');
            if (role === 'doctor') {
                doctorFields.style.display = 'block';
            } else {
                doctorFields.style.display = 'none';
            }
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
